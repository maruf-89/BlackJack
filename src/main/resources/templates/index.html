<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blackjack — Table Royale</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="game">

    <nav id="mainNav" class="main-nav"></nav>

    <h1>♠ Table Royale ♠</h1>
    <p class="subtitle">Blackjack pays 3 to 2</p>

    <div id="authPanel" class="auth-panel">
        <div class="auth-tabs">
            <button type="button" id="loginTab" class="auth-tab active" onclick="switchAuthMode('login')">Logga in</button>
            <button type="button" id="registerTab" class="auth-tab" onclick="switchAuthMode('register')">Skapa konto</button>
        </div>

        <div class="field">
            <label for="authUsername">Användarnamn</label>
            <input id="authUsername" placeholder="Användarnamn">
        </div>

        <div class="field" id="emailField" style="display:none;">
            <label for="authEmail">E-post</label>
            <input id="authEmail" type="email" placeholder="namn@exempel.se">
        </div>

        <div class="field">
            <label for="authPassword">Lösenord</label>
            <input id="authPassword" type="password" placeholder="Lösenord">
        </div>

        <p id="authError" class="auth-error"></p>

        <button id="authSubmitBtn" class="primary" data-mode="login" onclick="submitAuth()">Logga in</button>
    </div>

    <div id="userBar" class="user-bar" style="display:none;">
        <span id="welcomeText"></span>
        <span id="balanceText" class="balance-text"></span>
        <button class="ghost" onclick="logout()">Logga ut</button>
    </div>

    <div class="setup" style="display:none;">
        <div class="field">
            <label for="bet">Insats</label>
            <input id="bet" value="10" type="number" min="1">
        </div>

        <div class="field">
            <label>Marker</label>
            <div class="chip-row">
                <div class="chip selected" data-val="10">10</div>
                <div class="chip" data-val="25">25</div>
                <div class="chip" data-val="50">50</div>
                <div class="chip" data-val="100">100</div>
            </div>
        </div>

        <button class="primary" onclick="startGame()">Starta spel</button>
    </div>

    <div class="table">

        <div class="seat">
            <div class="seat-header">
                <span class="seat-label">Given</span>
                <span class="score-badge" id="dealerScore">0</span>
            </div>
            <div id="dealerCards" class="cards">
                <div class="empty-hint">Väntar på start…</div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="seat">
            <div class="seat-header">
                <span class="seat-label">Du</span>
                <span class="score-badge" id="playerScore">0</span>
            </div>
            <div id="playerCards" class="cards">
                <div class="empty-hint">Väntar på start…</div>
            </div>
        </div>

    </div>

    <div class="buttons">
        <button id="hitBtn" class="action" onclick="hit()" disabled>🃏 Ta kort</button>
        <button id="standBtn" class="action" onclick="stand()" disabled>✋ Stanna</button>
        <button id="newRoundBtn" class="primary" onclick="newRound()" style="display:none;">🔄 Ny omgång</button>
    </div>

    <div class="status-bar">
        <h2 id="status"></h2>
    </div>

</div>

<script src="/js/auth.js"></script>
<script src="/js/game.js"></script>

</body>
</html>
