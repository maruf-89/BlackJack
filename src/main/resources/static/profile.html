<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profil — Table Royale</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="game">

    <nav id="mainNav" class="main-nav"></nav>

    <h1>♠ Profil ♠</h1>
    <p class="subtitle">Ditt konto</p>

    <div id="profile-loggedOut" class="panel state-message">
        <p>Du måste logga in för att se den här sidan.</p>
        <a class="primary-link" href="/">Gå till inloggning</a>
    </div>

    <div id="profile-content" class="panel" style="display:none;">

        <div class="profile-info">
            <div class="info-row">
                <span class="info-label">Användarnamn</span>
                <span id="profileUsername" class="info-value"></span>
            </div>
            <div class="info-row">
                <span class="info-label">E-post</span>
                <span id="profileEmail" class="info-value"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Saldo</span>
                <span id="profileBalance" class="info-value"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Roll</span>
                <span id="profileRole" class="info-value"></span>
            </div>
        </div>

        <div class="divider"></div>

        <h2 class="section-title">Byt lösenord</h2>

        <div class="field">
            <label for="currentPassword">Nuvarande lösenord</label>
            <input id="currentPassword" type="password" placeholder="Nuvarande lösenord">
        </div>

        <div class="field">
            <label for="newPassword">Nytt lösenord</label>
            <input id="newPassword" type="password" placeholder="Minst 4 tecken">
        </div>

        <div class="field">
            <label for="confirmPassword">Bekräfta nytt lösenord</label>
            <input id="confirmPassword" type="password" placeholder="Upprepa nytt lösenord">
        </div>

        <p id="passwordError" class="auth-error"></p>
        <p id="passwordSuccess" class="auth-success"></p>

        <button class="primary" onclick="submitPasswordChange()">Uppdatera lösenord</button>

    </div>

</div>

<script src="/js/auth.js"></script>
<script src="/js/profile.js"></script>

</body>
</html>
